name: Grumble
options:
  bundleIdPrefix: com.leftshift
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    # Fork adds provisional partial transcripts (live self-correction);
    # branched from v0.15.5, intended to be upstreamed.
    url: https://github.com/fcjr/FluidAudio
    branch: provisional-partials
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

schemes:
  Grumble:
    build:
      targets:
        Grumble: all
    run:
      config: Debug
    archive:
      config: Release
  GrumbleAppStore:
    build:
      targets:
        GrumbleAppStore: all
    run:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Overridden by CI from the release tag (APP_VERSION / APP_BUILD).
    MARKETING_VERSION: "0.1.8"
    CURRENT_PROJECT_VERSION: "9"
    # Sign everything (including Debug) with Developer ID so dev builds and
    # DMG installs share one TCC identity - otherwise permission grants only
    # apply to whichever signature was granted last.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application: Left Shift Logical, LLC (KNBPD99JQM)"
    DEVELOPMENT_TEAM: KNBPD99JQM
    # Required for the microphone under the hardened runtime: without the
    # audio-input entitlement, tccd denies mic access without ever prompting.
    CODE_SIGN_ENTITLEMENTS: Resources/Grumble.entitlements

targets:
  Grumble:
    type: application
    platform: macOS
    sources:
      - Sources/Grumble
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icns
        buildPhase: resources
      - path: Resources/Acknowledgements.txt
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - package: Sparkle
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Grumble
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: Grumble listens to your microphone to transcribe your speech into text.
        SUFeedURL: https://grumble.computer/desktop/darwin/appcast.xml
        SUEnableAutomaticChecks: true
        SUPublicEDKey: WArXB/9ipPXBqgStv95Sw1WxCFDvWy1FWAN4u/l5w8g=
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leftshift.grumble
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # Mac App Store variant: sandboxed, no Sparkle (the store owns updates).
  # Archived with the Developer ID identity like everything else; export to
  # App Store Connect re-signs with a cloud-managed Apple Distribution
  # certificate (see `just appstore`).
  GrumbleAppStore:
    type: application
    platform: macOS
    sources:
      - Sources/Grumble
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icns
        buildPhase: resources
      - path: Resources/Acknowledgements.txt
        buildPhase: resources
    dependencies:
      - package: FluidAudio
    info:
      path: Resources/InfoAppStore.plist
      properties:
        CFBundleDisplayName: Grumble
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: Grumble listens to your microphone to transcribe your speech into text.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: Grumble
        PRODUCT_BUNDLE_IDENTIFIER: com.leftshift.grumble
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/GrumbleAppStore.entitlements
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG APPSTORE
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
