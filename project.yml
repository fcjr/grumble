name: Grumble
options:
  bundleIdPrefix: com.leftshift
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.15.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

schemes:
  Grumble:
    build:
      targets:
        Grumble: all
    run:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Overridden by CI from the release tag (APP_VERSION / APP_BUILD).
    MARKETING_VERSION: "0.1.3"
    CURRENT_PROJECT_VERSION: "4"
    # Sign everything (including Debug) with Developer ID so dev builds and
    # DMG installs share one TCC identity - otherwise permission grants only
    # apply to whichever signature was granted last.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application: Left Shift Logical, LLC (KNBPD99JQM)"
    DEVELOPMENT_TEAM: KNBPD99JQM

targets:
  Grumble:
    type: application
    platform: macOS
    sources:
      - Sources/Grumble
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icns
        buildPhase: resources
      - path: Resources/Acknowledgements.txt
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - package: Sparkle
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Grumble
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: Grumble listens to your microphone to transcribe your speech into text.
        SUFeedURL: https://grumble.computer/desktop/darwin/appcast.xml
        SUEnableAutomaticChecks: true
        SUPublicEDKey: WArXB/9ipPXBqgStv95Sw1WxCFDvWy1FWAN4u/l5w8g=
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leftshift.grumble
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
